<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳳山溪畔的守護者：關西太和宮的故事</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #050e1f;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(24, 95, 165, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(14, 110, 86, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(83, 74, 183, 0.15) 0%, transparent 50%);
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* 星點背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 45%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 75%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 25%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* 標題區 */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(55, 138, 221, 0.15);
      border: 1px solid rgba(55, 138, 221, 0.35);
      color: #7dc4f0;
      padding: 5px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
      backdrop-filter: blur(8px);
    }

    .badge svg { width: 14px; height: 14px; flex-shrink: 0; }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      color: #e8f4ff;
      letter-spacing: 0.02em;
      text-shadow: 0 0 40px rgba(55, 138, 221, 0.5);
    }

    .subtitle {
      font-size: 13px;
      color: rgba(160, 200, 240, 0.6);
      letter-spacing: 0.05em;
    }

    /* 主卡片 — 玻璃態 */
    .card {
      width: 100%;
      background: rgba(8, 20, 45, 0.65);
      border: 1px solid rgba(55, 138, 221, 0.2);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(55, 138, 221, 0.08) inset,
        0 40px 80px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(24, 95, 165, 0.1);
    }

    /* 進度條 */
    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(55, 138, 221, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1a6db5, #53b3f5);
      transition: width 0.5s ease;
      border-radius: 0 2px 2px 0;
      box-shadow: 0 0 8px rgba(83, 179, 245, 0.6);
    }

    /* 內容區 */
    .flip-outer {
      perspective: 1200px;
      overflow: hidden;
    }

    .flip-container {
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      .flip-container { flex-direction: row; }
    }

    .flip-next {
      animation: flipNextAnim 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
      transform-style: preserve-3d;
      transform-origin: center right;
    }

    .flip-prev {
      animation: flipPrevAnim 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
      transform-style: preserve-3d;
      transform-origin: center left;
    }

    @keyframes flipNextAnim {
      0% { transform: rotateY(90deg) scale(0.85) translateZ(-160px) translateX(15%); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1) translateZ(0) translateX(0); opacity: 1; }
    }

    @keyframes flipPrevAnim {
      0% { transform: rotateY(-90deg) scale(0.85) translateZ(-160px) translateX(-15%); opacity: 0; }
      100% { transform: rotateY(0deg) scale(1) translateZ(0) translateX(0); opacity: 1; }
    }

    /* 圖片側 */
    .image-side {
      width: 100%;
      padding: 1.5rem;
      border-bottom: 1px solid rgba(55, 138, 221, 0.12);
      background: rgba(4, 12, 30, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
    }

    @media (min-width: 768px) {
      .image-side {
        width: 50%;
        border-bottom: none;
        border-right: 1px solid rgba(55, 138, 221, 0.12);
        min-height: 440px;
      }
    }

    #story-image {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 12px;
      display: none;
    }

    .img-placeholder {
      width: 100%;
      min-height: 280px;
      border: 1.5px dashed rgba(55, 138, 221, 0.25);
      border-radius: 16px;
      background: rgba(24, 95, 165, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 1rem;
    }

    .img-placeholder svg { color: rgba(55, 138, 221, 0.3); width: 52px; height: 52px; }

    .img-placeholder-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(120, 180, 240, 0.7);
    }

    .img-placeholder-hint {
      font-size: 12px;
      color: rgba(100, 150, 200, 0.5);
      background: rgba(24, 95, 165, 0.08);
      border: 1px solid rgba(55, 138, 221, 0.15);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.7;
    }

    /* 文字側 */
    .text-side {
      width: 100%;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      background: rgba(6, 16, 38, 0.3);
    }

    @media (min-width: 768px) { .text-side { width: 50%; padding: 3rem 2.5rem; } }

    /* 裝飾光暈 */
    .text-side::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(24, 95, 165, 0.12), transparent 70%);
      pointer-events: none;
    }

    #story-text {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: rgba(210, 235, 255, 0.88);
      line-height: 2.0;
      letter-spacing: 0.04em;
      text-align: justify;
      font-family: 'Georgia', 'Noto Serif TC', serif;
      position: relative;
      z-index: 1;
    }

    #error-msg {
      display: none;
      margin-top: 1rem;
      padding: 10px 14px;
      background: rgba(162, 45, 45, 0.15);
      border: 1px solid rgba(226, 75, 74, 0.3);
      border-radius: 8px;
      color: #f0a0a0;
      font-size: 13px;
    }

    /* 控制面板 */
    .controls {
      background: rgba(5, 14, 35, 0.6);
      border-top: 1px solid rgba(55, 138, 221, 0.12);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      backdrop-filter: blur(10px);
    }

    @media (min-width: 768px) {
      .controls { flex-direction: row; align-items: center; justify-content: space-between; }
    }

    /* 切換開關 */
    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
    }

    @media (min-width: 768px) { .toggles { justify-content: flex-start; } }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: rgba(140, 190, 240, 0.7);
      font-weight: 500;
    }

    .toggle-label input { display: none; }

    .toggle-track {
      width: 40px;
      height: 22px;
      border-radius: 999px;
      background: rgba(55, 138, 221, 0.15);
      border: 1px solid rgba(55, 138, 221, 0.25);
      position: relative;
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(120, 160, 210, 0.5);
      transition: transform 0.25s, background 0.25s;
    }

    .toggle-label input:checked ~ .toggle-track {
      background: rgba(55, 138, 221, 0.35);
      border-color: rgba(55, 138, 221, 0.6);
    }

    .toggle-label input:checked ~ .toggle-track .toggle-thumb {
      transform: translateX(18px);
      background: #53b3f5;
      box-shadow: 0 0 6px rgba(83, 179, 245, 0.7);
    }

    /* 右側：頁碼 + 按鈕 */
    .controls-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }

    @media (min-width: 768px) { .controls-right { flex-direction: row; width: auto; flex: 1; justify-content: flex-end; } }

    #page-indicator {
      font-size: 12px;
      color: rgba(100, 155, 215, 0.5);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 圓形按鈕 (上/下頁、下載) */
    .btn-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(55, 138, 221, 0.25);
      background: rgba(24, 55, 100, 0.3);
      color: rgba(140, 190, 240, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-circle:hover {
      background: rgba(55, 138, 221, 0.18);
      border-color: rgba(55, 138, 221, 0.5);
      color: #90d0ff;
      box-shadow: 0 0 12px rgba(55, 138, 221, 0.25);
    }

    .btn-circle:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-circle svg { width: 20px; height: 20px; }

    /* 主播放按鈕 */
    .btn-play {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      height: 44px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
      white-space: nowrap;
      border: 1px solid rgba(55, 138, 221, 0.45);
      background: rgba(24, 95, 165, 0.25);
      color: #90ccff;
      box-shadow: 0 0 20px rgba(24, 95, 165, 0.2);
    }

    .btn-play:hover {
      background: rgba(55, 138, 221, 0.35);
      border-color: rgba(83, 179, 245, 0.65);
      color: #c0e8ff;
      box-shadow: 0 0 24px rgba(55, 138, 221, 0.35);
    }

    .btn-play:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-play.playing {
      border-color: rgba(226, 75, 74, 0.5);
      background: rgba(162, 45, 45, 0.2);
      color: #ffb0b0;
      box-shadow: 0 0 20px rgba(162, 45, 45, 0.2);
    }

    .btn-play svg { width: 18px; height: 18px; }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin { animation: spin 1.2s linear infinite; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- 標題 -->
  <div class="header">
    <div class="badge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      關西太和宮的故事
    </div>
    <h1>鳳山溪畔的守護者</h1>
    <p class="subtitle">作者：Vincent Wang</p>
  </div>

  <!-- 主卡片 -->
  <div class="card">

    <!-- 進度條 -->
    <div class="progress-track">
      <div class="progress-fill" id="progress-bar" style="width: 11.11%;"></div>
    </div>

    <!-- 翻頁內容區 -->
    <div class="flip-outer">
      <div id="flip-container" class="flip-container flip-next">

        <!-- 圖片側 -->
        <div class="image-side">
          <img id="story-image" src="" alt="故事插圖" onerror="handleImageError()">
          <div class="img-placeholder" id="image-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            <p class="img-placeholder-title">插圖位置：<span id="image-filename">images/pic01.png</span></p>
            <p class="img-placeholder-hint"><span id="image-hint"></span></p>
          </div>
        </div>

        <!-- 文字側 -->
        <div class="text-side">
          <p id="story-text"></p>
          <div id="error-msg"></div>
        </div>

      </div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">

      <!-- 切換器 -->
      <div class="toggles">
        <label class="toggle-label">
          <input type="checkbox" id="autoplay-toggle" onchange="toggleAutoPlay()">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          自動播放聲音
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="autoflip-toggle" onchange="toggleAutoFlip()">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          自動翻頁
        </label>
      </div>

      <!-- 右側控制 -->
      <div class="controls-right">
        <span id="page-indicator">第 1 頁 / 共 9 頁</span>
        <div class="btn-row">

          <button class="btn-circle" id="prev-btn" onclick="goToPrevPage()" disabled title="上一頁">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>

          <button class="btn-play" id="play-btn" onclick="playAudio()">
            <span id="play-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </span>
            <span id="play-text">朗讀這頁</span>
          </button>

          <button class="btn-circle" id="download-btn" onclick="downloadAudio()" title="下載語音檔">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          </button>

          <button class="btn-circle" id="next-btn" onclick="goToNextPage()" title="下一頁">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const storyPages = [
    { id: 1, text: "陽光灑在波光粼粼的鳳山溪上，像是一條閃亮的銀絲帶。阿賢爺爺牽著小羽的手，沿著溪畔漫步。爺爺指著前方巍峨的建築說：「小羽，那裡就是關西人的大客廳——太和宮。它已經守護了這片土地兩百多年了喔！」小羽好奇地睜大眼睛，看著那紅瓦飛簷。", image: "images/pic01.png", audio: "wav/p01.wav", imageHint: "爺爺與小羽在波光粼粼的鳳山溪畔散步，遠處可見紅瓦飛簷的太和宮。" },
    { id: 2, text: "「在很久很久以前的乾隆年間，先民來到這裡開墾。」阿賢爺爺邊走邊說，「大家為了祈求平安，在1812年蓋了這座廟。」小羽看著廟門口斑駁的石階，彷彿能看見古人辛勤工作的身影。爺爺告訴她，這座廟就像一位老奶奶，見證了關西的成長與變化。", image: "images/pic02.png", audio: "wav/p02.wav", imageHint: "先民辛勤開墾的疊影，以及太和宮門口充滿歷史感的斑駁石階。" },
    { id: 3, text: "故事並不總是平順的。爺爺嘆了口氣說：「1895年，太和宮不幸毀於一場大火。直到1900年，一位叫羅碧玉的先生發起重建，大家出錢出力，才讓廟宇重現光彩。」小羽想像著羅碧玉先生指揮著工匠，大家揮汗如雨，一磚一瓦重新搭起這座信仰中心。", image: "images/pic03.png", audio: "wav/p03.wav", imageHint: "羅碧玉先生與鄉親工匠們揮汗如雨、一磚一瓦重建太和宮的場景。" },
    { id: 4, text: "走進廟內，一對威武的龍柱吸引了小羽。爺爺指著石柱說：「這是石雕大師蔣梅水的作品。你看這兩條龍，活靈活現，好像隨時會從柱子上飛到雲端去呢！」小羽伸出小手，輕輕觸摸龍鱗，感受那冰涼而細緻的石雕工藝。", image: "images/pic04.png", audio: "wav/p04.wav", imageHint: "小羽伸出小手，輕輕觸摸蔣梅水大師雕刻的精美石雕龍柱。" },
    { id: 5, text: "小羽抬頭看見牆上的彩色陶瓷偶，色彩斑斕且動作生動。爺爺介紹道：「這是姚自來大師的『交趾陶』作品，這一段故事叫做『天仙配』。」小羽數著上面的仙女，每一尊的表情都好精緻，衣服上的皺褶就像真的一樣，這讓她看得入了迷。", image: "images/pic05.png", audio: "wav/p05.wav", imageHint: "牆上色彩斑斕的「天仙配」交趾陶，仙女的表情與衣服皺褶栩栩如生。" },
    { id: 6, text: "「快看屋頂！」爺爺拉著小羽來到正殿中央。那是一座像蜘蛛網一樣、層層疊疊的木造天花板。爺爺說：「這是徐清大師設計的『藻井』，完全沒用一根釘子喔！」小羽跟著爺爺一起仰起頭，覺得自己好像正看著一朵在天花板綻放的木雕大花。", image: "images/pic06.png", audio: "wav/p06.wav", imageHint: "爺爺與小羽在正殿仰頭看著如同巨大木雕花朵般、層層疊疊的無釘「藻井」。" },
    { id: 7, text: "來到大門口，兩位威風凜凜的門神正守著太和宮。爺爺笑著說：「這是李登勝大師畫的。無論你走到哪裡，門神的眼睛好像都會跟著你轉喔！」小羽調皮地左跑跑、右跑跑，發現門神真的都在看她，忍不住咯咯地笑出聲來。", image: "images/pic07.png", audio: "wav/p07.wav", imageHint: "小羽在門口左右調皮跑動，李登勝大師畫的威風門神眼睛彷彿跟著她轉。" },
    { id: 8, text: "繞到廟後，爺爺指著遠處的山坡說：「傳說太和宮位在『松樹排龍脈』上，那是大地的靈氣所在。」小羽看著那些蔥鬱的樹木，想像著一條隱形的巨龍正靜靜地躺在山巒間，用牠的力量守護著這座廟與整個關西。", image: "images/pic08.png", audio: "wav/p08.wav", imageHint: "遠處蔥鬱的山坡，雲霧間隱約有一條巨龍的輪廓，象徵著「松樹排龍脈」。" },
    { id: 9, text: "參訪結束了，夕陽將太和宮的影子拉得很長。小羽牽著爺爺的手往家走，她回頭望向那座古老的廟宇，心裡想著：這裡不主要有建築，更是許多大師的心血和家鄉的故事。太和宮會繼續在鳳山溪畔，守護著爺爺、守護著小羽，守護著每一個人。", image: "images/pic09.png", audio: "wav/p09.wav", imageHint: "夕陽西下，太和宮的影子被拉長，小羽牽著爺爺的手走向歸途，回頭凝望廟宇。" }
  ];

  let currentPage = 0;
  let isPlaying = false;
  let isLoadingAudio = false;
  let isAutoPlay = false;
  let isAutoFlip = false;
  let flipTimeout = null;

  const audioObj = new Audio();

  const svgVolume = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
  const svgPause = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="4" height="16" x="6" y="4"/><rect width="4" height="16" x="14" y="4"/></svg>`;
  const svgLoader = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;

  window.onload = () => {
    renderPage('next');
    audioObj.addEventListener('ended', () => {
      isPlaying = false;
      updatePlayButtonUI();
      if (isAutoFlip && currentPage < storyPages.length - 1) {
        clearTimeout(flipTimeout);
        flipTimeout = setTimeout(goToNextPage, 1500);
      }
    });
  };

  function renderPage(direction) {
    const page = storyPages[currentPage];
    document.getElementById('story-text').innerText = page.text;

    const imgEl = document.getElementById('story-image');
    const placeholderEl = document.getElementById('image-placeholder');
    document.getElementById('image-hint').innerText = page.imageHint;
    document.getElementById('image-filename').innerText = page.image;

    imgEl.src = page.image;
    imgEl.classList.remove(); imgEl.style.display = '';
    placeholderEl.style.display = 'none';
    imgEl.style.display = 'block';

    document.getElementById('page-indicator').innerText = `第 ${currentPage + 1} 頁 / 共 ${storyPages.length} 頁`;
    const progress = ((currentPage + 1) / storyPages.length) * 100;
    document.getElementById('progress-bar').style.width = `${progress}%`;

    document.getElementById('prev-btn').disabled = currentPage === 0;
    document.getElementById('next-btn').disabled = currentPage === storyPages.length - 1;
    document.getElementById('error-msg').style.display = 'none';

    const container = document.getElementById('flip-container');
    container.classList.remove('flip-next', 'flip-prev');
    void container.offsetWidth;
    container.classList.add(direction === 'next' ? 'flip-next' : 'flip-prev');

    if (isAutoPlay) {
      setTimeout(() => { if (!isPlaying && !isLoadingAudio) playAudio(); }, 500);
    }
  }

  function handleImageError() {
    document.getElementById('story-image').style.display = 'none';
    document.getElementById('image-placeholder').style.display = 'flex';
  }

  function toggleAutoPlay() {
    isAutoPlay = document.getElementById('autoplay-toggle').checked;
    if (isAutoPlay && !isPlaying && !isLoadingAudio) playAudio();
  }

  function toggleAutoFlip() {
    isAutoFlip = document.getElementById('autoflip-toggle').checked;
    if (!isAutoFlip) { clearTimeout(flipTimeout); }
    else if (!isPlaying && !isLoadingAudio && currentPage < storyPages.length - 1) goToNextPage();
  }

  function goToNextPage() {
    if (currentPage < storyPages.length - 1) {
      clearTimeout(flipTimeout);
      stopAudio();
      currentPage++;
      renderPage('next');
    }
  }

  function goToPrevPage() {
    if (currentPage > 0) {
      clearTimeout(flipTimeout);
      stopAudio();
      currentPage--;
      renderPage('prev');
    }
  }

  function updatePlayButtonUI() {
    const btn = document.getElementById('play-btn');
    const icon = document.getElementById('play-icon');
    const text = document.getElementById('play-text');

    btn.classList.remove('playing');
    if (isLoadingAudio) {
      btn.disabled = true;
      icon.innerHTML = svgLoader;
      text.innerText = '讀取音檔中…';
    } else if (isPlaying) {
      btn.disabled = false;
      btn.classList.add('playing');
      icon.innerHTML = svgPause;
      text.innerText = '暫停播放';
    } else {
      btn.disabled = false;
      icon.innerHTML = svgVolume;
      text.innerText = '朗讀這頁';
    }
  }

  function stopAudio() {
    audioObj.pause();
    audioObj.currentTime = 0;
    isPlaying = false;
    updatePlayButtonUI();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.innerText = msg;
    el.style.display = 'block';
  }

  async function playAudio() {
    if (isPlaying) { stopAudio(); return; }
    const page = storyPages[currentPage];
    document.getElementById('error-msg').style.display = 'none';
    isLoadingAudio = true;
    updatePlayButtonUI();
    try {
      audioObj.src = page.audio;
      await audioObj.play();
      isPlaying = true;
      isLoadingAudio = false;
      updatePlayButtonUI();
    } catch (error) {
      showError(`無法播放音檔。請確認是否已將語音檔放入 "${page.audio}" 位置！`);
      isPlaying = false;
      isLoadingAudio = false;
      updatePlayButtonUI();
      if (isAutoFlip && currentPage < storyPages.length - 1) {
        clearTimeout(flipTimeout);
        flipTimeout = setTimeout(goToNextPage, 3000);
      }
    }
  }

  function downloadAudio() {
    const page = storyPages[currentPage];
    const a = document.createElement('a');
    a.href = page.audio;
    a.download = page.audio.split('/').pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
</script>
</body>
</html>
