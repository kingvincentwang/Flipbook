<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子書書庫</title>
<style>
/* ════════════════════════════════════
   ★ 書庫設定（修改這裡）
   ════════════════════════════════════ */
</style>
<script>
/* ════════════════════════════════════
   ★ 書庫設定
   ════════════════════════════════════ */
const LIBRARY = {
  title:    '關西國小電子書庫',   // 書庫名稱
  subtitle: '點擊書本開始閱讀',   // 副標題
  imgExt:   'png',               // 封面圖片副檔名

  books: [
    // 每本書一筆，folder = 存放 flipbook.html 和圖片的資料夾名稱
    // cover 留空會自動使用 folder/p1.jpg 當封面
    {
      title:  '關西仙草小學堂',
      folder: 'book01',
      file:   'flipbook.html',   // 資料夾內的 HTML 檔名
      cover:  '',                // 留空 = 自動用 p1.jpg；或填指定路徑
      desc:   '認識關西在地植物仙草的故事',
      tags:   ['自然', '在地文化'],
    },
    {
      title:  '羅屋書院',
      folder: 'book02',
      file:   'flipbook.html',
      cover:  '',
      desc:   '探索傳統建築裡的吉祥符號',
      tags:   ['文化', '藝術'],
    },
    {
      title:  '番茄新花樣',
      folder: 'book03',
      file:   'flipbook.html',
      cover:  '',
      desc:   '從一顆番茄看見世界',
      tags:   ['飲食', '探索'],
    },
    // 複製上方格式新增更多書本 ↑
  ]
};
/* ════════════════════════════════════ */
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0c0a; --surface: #1a1510; --border: #3a2e22;
  --accent: #c4872a; --glow: rgba(196,135,42,0.3);
  --muted: #9a7d60; --dim: #6a5040; --text: #e0c8a8;
  --card-bg: #1e1a14; --card-hover: #26201a;
  --shelf: linear-gradient(to bottom, #2a1e0e, #1a1208);
  --spine: linear-gradient(to right, #5a3d1e, #9a6424, #d4943a, #9a6424, #5a3d1e);
}

html, body { height: 100%; }
body {
  background: var(--bg);
  font-family: 'Georgia', 'Noto Serif TC', serif;
  color: var(--text); min-height: 100vh;
  overflow-x: hidden;
}

/* ── 背景紋理 ── */
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(ellipse 100% 60% at 50% 0%, rgba(196,135,42,0.07) 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c4872a' fill-opacity='0.025'%3E%3Cpath d='M0 0h40v40H0zm40 40h40v40H40z'/%3E%3C/g%3E%3C/svg%3E");
}

/* ── Header ── */
header {
  position: relative; z-index: 1;
  text-align: center; padding: 52px 24px 36px;
  border-bottom: 1px solid rgba(196,135,42,0.15);
}
.lib-icon { font-size: 3rem; margin-bottom: 10px; filter: drop-shadow(0 0 24px var(--glow)); }
.lib-title {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: var(--accent); letter-spacing: 4px;
  text-shadow: 0 2px 20px var(--glow);
  margin-bottom: 8px;
}
.lib-sub { color: var(--muted); font-size: 0.9rem; letter-spacing: 2px; }
.lib-count { margin-top: 10px; font-size: 0.78rem; color: var(--dim); letter-spacing: 1px; }

/* ── Search ── */
.search-wrap {
  position: relative; z-index: 1;
  max-width: 400px; margin: 28px auto 0;
  padding: 0 24px;
}
.search-box {
  width: 100%; padding: 10px 16px 10px 40px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 24px; color: var(--text);
  font-size: 0.88rem; font-family: inherit;
  outline: none; transition: all 0.2s;
}
.search-box:focus { border-color: var(--accent); background: rgba(196,135,42,0.05); box-shadow: 0 0 0 3px rgba(196,135,42,0.1); }
.search-box::placeholder { color: var(--dim); }
.search-icon { position: absolute; left: 37px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 0.9rem; pointer-events: none; }

/* ── Tag Filter ── */
.tag-filter {
  position: relative; z-index: 1;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  padding: 16px 24px 0; max-width: 700px; margin: 0 auto;
}
.tag-pill {
  padding: 4px 14px; border-radius: 20px; font-size: 0.78rem;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; font-family: inherit;
  transition: all 0.2s; letter-spacing: 0.5px;
}
.tag-pill:hover { border-color: var(--accent); color: var(--accent); }
.tag-pill.active { background: var(--accent); border-color: var(--accent); color: #1a1008; font-weight: bold; }

/* ── Main grid ── */
main {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto;
  padding: 36px 24px 60px;
}

/* ── 空狀態 ── */
.empty-state { text-align: center; padding: 60px 24px; color: var(--dim); font-size: 0.9rem; }

/* ── 書架格線 ── */
.shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 32px 24px;
}

/* ── 書本卡片 ── */
.book-card {
  cursor: pointer; text-decoration: none; color: inherit;
  display: flex; flex-direction: column;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.book-card:nth-child(1){ animation-delay: 0.05s }
.book-card:nth-child(2){ animation-delay: 0.1s }
.book-card:nth-child(3){ animation-delay: 0.15s }
.book-card:nth-child(4){ animation-delay: 0.2s }
.book-card:nth-child(5){ animation-delay: 0.25s }
.book-card:nth-child(6){ animation-delay: 0.3s }

/* 書本立體外形 */
.book-3d {
  position: relative;
  width: 100%; aspect-ratio: 3/4;
  transform-style: preserve-3d;
  perspective: 800px;
  transition: transform 0.35s cubic-bezier(0.25,1,0.5,1), filter 0.35s;
  filter: drop-shadow(8px 12px 20px rgba(0,0,0,0.7));
  margin-bottom: 14px;
}
.book-card:hover .book-3d {
  transform: translateY(-8px) rotateY(-12deg) rotateX(2deg);
  filter: drop-shadow(14px 20px 30px rgba(0,0,0,0.8)) drop-shadow(0 0 20px var(--glow));
}

/* 封面 */
.book-cover {
  position: absolute; inset: 0;
  border-radius: 2px 6px 6px 2px;
  overflow: hidden; background: #2a1e10;
}
.book-cover img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.4s ease;
}
.book-card:hover .book-cover img { transform: scale(1.04); }

/* 封面光澤 */
.book-cover::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
  pointer-events: none;
  border-radius: 2px 6px 6px 2px;
}

/* 書脊 */
.book-spine {
  position: absolute; left: -10px; top: 4px; bottom: 4px;
  width: 10px; background: var(--spine);
  border-radius: 2px 0 0 2px;
  box-shadow: -2px 0 6px rgba(0,0,0,0.5);
}

/* 書底陰影 */
.book-shadow {
  position: absolute; bottom: -8px; left: 0; right: 0;
  height: 16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.5) 0%, transparent 70%);
  filter: blur(4px);
}

/* 封面佔位（載入前）*/
.book-placeholder {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #2a1e10, #1a1008);
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px 6px 6px 2px;
}
.book-placeholder span { font-size: 2.5rem; opacity: 0.3; }

/* ── 卡片資訊 ── */
.book-info { padding: 0 4px; }
.book-name {
  font-size: 0.95rem; color: #d4a870;
  margin-bottom: 4px; line-height: 1.4;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.book-desc {
  font-size: 0.76rem; color: var(--dim); line-height: 1.5;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  margin-bottom: 6px;
}
.book-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.book-tag {
  font-size: 0.68rem; color: var(--muted);
  border: 1px solid #3a2e22; border-radius: 10px;
  padding: 1px 7px; letter-spacing: 0.3px;
}

/* 懸停開啟提示 */
.book-open-hint {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.25s;
  border-radius: 2px 6px 6px 2px;
  backdrop-filter: blur(2px);
}
.book-open-hint span {
  background: var(--accent); color: #1a1008;
  padding: 8px 18px; border-radius: 20px;
  font-size: 0.82rem; font-weight: bold; letter-spacing: 1px;
  box-shadow: 0 4px 16px rgba(196,135,42,0.4);
}
.book-card:hover .book-open-hint { opacity: 1; }

/* ── Footer ── */
footer {
  position: relative; z-index: 1;
  text-align: center; padding: 20px 24px 32px;
  border-top: 1px solid rgba(196,135,42,0.1);
  color: var(--dim); font-size: 0.78rem; letter-spacing: 1px;
}

/* ── 響應式 ── */
@media (max-width: 480px) {
  .shelf-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 24px 16px; }
  header { padding: 36px 16px 24px; }
  main { padding: 24px 16px 48px; }
}
@media (min-width: 900px) {
  .shelf-grid { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
}
</style>
</head>
<body>

<header>
  <div class="lib-icon">📚</div>
  <h1 class="lib-title" id="lib-title"></h1>
  <p class="lib-sub" id="lib-sub"></p>
  <p class="lib-count" id="lib-count"></p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-box" id="search-box" placeholder="搜尋書名或標籤…">
  </div>

  <div class="tag-filter" id="tag-filter"></div>
</header>

<main>
  <div class="shelf-grid" id="shelf-grid"></div>
  <div class="empty-state" id="empty-state" style="display:none">找不到符合的電子書</div>
</main>

<footer>
  <span id="footer-title"></span> &nbsp;·&nbsp; 翻頁電子書書庫
</footer>

<script>
// ── 初始化 ──
document.getElementById('lib-title').textContent  = LIBRARY.title;
document.getElementById('lib-sub').textContent    = LIBRARY.subtitle;
document.getElementById('footer-title').textContent = LIBRARY.title;

// 收集所有 tag
const allTags = [...new Set(LIBRARY.books.flatMap(b => b.tags || []))];
let activeTag = '';
let searchQuery = '';

// ── Tag Filter ──
const tagFilter = document.getElementById('tag-filter');
if (allTags.length) {
  const allBtn = document.createElement('button');
  allBtn.className = 'tag-pill active';
  allBtn.textContent = '全部';
  allBtn.onclick = () => { activeTag = ''; updateFilter(); setActiveTag(allBtn); };
  tagFilter.appendChild(allBtn);

  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-pill';
    btn.textContent = tag;
    btn.onclick = () => { activeTag = tag; updateFilter(); setActiveTag(btn); };
    tagFilter.appendChild(btn);
  });
}

function setActiveTag(el) {
  document.querySelectorAll('.tag-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── 搜尋 ──
document.getElementById('search-box').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  updateFilter();
});

// ── 渲染書本 ──
function renderBooks(books) {
  const grid = document.getElementById('shelf-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';

  if (books.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  books.forEach((book, i) => {
    const coverSrc = book.cover || `${book.folder}/p1.${LIBRARY.imgExt}`;
    const href = `${book.folder}/${book.file}`;

    const a = document.createElement('a');
    a.className = 'book-card';
    a.href = href;
    a.style.animationDelay = `${i * 0.06}s`;

    const tagsHtml = (book.tags || []).map(t =>
      `<span class="book-tag">${t}</span>`
    ).join('');

    a.innerHTML = `
      <div class="book-3d">
        <div class="book-spine"></div>
        <div class="book-placeholder"><span>📖</span></div>
        <div class="book-cover">
          <img src="${coverSrc}" alt="${book.title}" loading="lazy"
               onerror="this.parentElement.style.display='none'">
        </div>
        <div class="book-open-hint"><span>開始閱讀</span></div>
        <div class="book-shadow"></div>
      </div>
      <div class="book-info">
        <div class="book-name">${book.title}</div>
        ${book.desc ? `<div class="book-desc">${book.desc}</div>` : ''}
        ${tagsHtml ? `<div class="book-tags">${tagsHtml}</div>` : ''}
      </div>`;

    grid.appendChild(a);
  });
}

function updateFilter() {
  const filtered = LIBRARY.books.filter(b => {
    const matchTag = !activeTag || (b.tags && b.tags.includes(activeTag));
    const matchSearch = !searchQuery ||
      b.title.toLowerCase().includes(searchQuery) ||
      (b.desc && b.desc.toLowerCase().includes(searchQuery)) ||
      (b.tags && b.tags.some(t => t.toLowerCase().includes(searchQuery)));
    return matchTag && matchSearch;
  });
  renderBooks(filtered);
  document.getElementById('lib-count').textContent =
    `共 ${LIBRARY.books.length} 本電子書${filtered.length < LIBRARY.books.length ? `（顯示 ${filtered.length} 本）` : ''}`;
}

// 初始渲染
updateFilter();
</script>
</body>
</html>
